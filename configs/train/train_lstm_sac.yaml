# train_lstm_sac.yaml
# 作用：
#   论文第 5 章 LSTM-SAC 正式训练配置。
#   该文件是正式 paper profile 训练入口；快速链路检查请使用 train_lstm_sac_smoke.yaml。

# total_episodes：论文对比到 1200 回合。
total_episodes: 1200

# max_steps_per_episode：双弹端到端训练的单回合最大交互步数。
max_steps_per_episode: 8000

# start_steps：初期随机探索步数。
start_steps: 1000

# update_after：经验池累计到该步数后开始更新。
update_after: 1000

# update_every：每隔多少环境步检查一次更新。
update_every: 1

# updates_per_step：每次触发更新执行多少次梯度更新。
updates_per_step: 1

# batch_size：序列 batch 大小，论文第 5 章为 128。
batch_size: 128

# eval_interval：周期性评估间隔。
eval_interval: 50

# eval_episodes：每次评估回合数。
eval_episodes: 5

# save_interval：checkpoint 保存间隔。
save_interval: 50

# log_interval：训练日志打印间隔。
log_interval: 1

# plot_interval：训练曲线保存间隔。
plot_interval: 50

# seed：随机种子。
seed: 0

# experiment_name：正式 LSTM-SAC 输出目录。
experiment_name: "lstm_sac_chapter5"

# 从已有 checkpoint 恢复训练；空值表示从头开始。
resume_from_checkpoint:
resume_load_optimizers: true
