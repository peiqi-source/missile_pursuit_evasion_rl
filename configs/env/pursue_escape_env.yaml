# pursue_escape_env.yaml
# 作用：
#   双拦截弹端到端 SAC 训练环境默认配置。
#   默认接口对：红方 1 维横向过载动作，观测为 10 维端到端状态。

# 红方最大横向过载，单位 g。
nzc_h_max: 2.0

# source_pn 模式下每枚拦截弹最大机动过载，单位 g。
source_pn_max_overload: 8.0

# 仿真步长和单回合最大时间。
dt: 0.01
t: 80.0

# 红方与拦截弹一阶自动驾驶仪时间常数，单位 s。
tau_h: 0.5
tau_i: 0.5

# 动力学积分方法。
# semi_implicit_euler：半隐式欧拉/辛欧拉，适合快速调试；
# explicit_euler：显式欧拉，仅用于对照；
# rk4：四阶龙格库达法，更接近论文仿真设置，正式实验建议使用。
dynamics_integration_mode: "rk4"

# 自动驾驶仪输出变化率限制，单位 g/s；空值表示使用论文/legacy 一阶惯性，不额外限速。
red_autopilot_rate_limit:
interceptor_autopilot_rate_limit:

# source_pn 比例导引系数。
N: 4.0

# 杀伤半径，论文式默认 5 m。
kill_radius: 5.0

# Mach 到 m/s 的工程换算声速。
sound_speed: 340.0

# 默认速度：红方 Mach 6，拦截弹 Mach 4。
red_mach: 6.0
interceptor_mach: 4.0

# 默认不随机化速度；课程训练可在阶段配置中开启。
red_mach_min:
red_mach_max:
interceptor_mach_min:
interceptor_mach_max:

# 制导模式：source_pn 或 mid_terminal_interceptor。
guidance_mode: "mid_terminal_interceptor"

# 默认观测为 10 维端到端状态。
observation_mode: "thesis_end_to_end_10d"

# 默认 200 km 一对二训练态势。
scenario_profile: "paper_200km_end_to_end"

# 默认双拦截弹；单弹回归可改为 1。
interceptor_count: 2

# 蓝方能力档位：weak / paper / strong / custom。
interceptor_ability_profile: "paper"

# 随机化：位置 ±3 km、航向 ±3 deg。
initial_randomization_enabled: true
interceptor_position_randomization_m: 3000.0
interceptor_heading_randomization_deg: 3.0

# 红方初始位置和航向。
red_initial_x: 0.0
red_initial_y: 25000.0
red_initial_z: 0.0
red_initial_theta_deg: 0.0
red_initial_psi_deg: 0.0
red_initial_psi_delta_min_deg: 0.0
red_initial_psi_delta_max_deg: 0.0

# custom profile 使用的单弹/多弹初始位置范围。
interceptor_initial_x_min: 200000.0
interceptor_initial_x_max: 200000.0
interceptor_initial_y_min: 25000.0
interceptor_initial_y_max: 25000.0
interceptor_initial_z_min: 0.0
interceptor_initial_z_max: 0.0
interceptor_initial_theta_deg: 0.0
interceptor_initial_heading_min_deg: 180.0
interceptor_initial_heading_max_deg: 180.0

# 预设攻击目标位置，用于 rHT 和端到端过程奖励。
target_initial_x: 220000.0
target_initial_y: 25000.0
target_initial_z: 0.0

# source_pn 对红方横向机动的前馈补偿系数。
source_pn_compensation_gain: 0.5

# 完整拦截弹能力和中制导参数。
interceptor_max_overload: 8.0
interceptor_midcourse_navigation_gain: 4.0
interceptor_midcourse_theta_shaping_gain: 0.07
interceptor_midcourse_psi_shaping_gain: 0.0
interceptor_target_compensation_gain: 4.0

# 完整拦截弹末制导参数。
interceptor_terminal_navigation_gain: 6.0
interceptor_terminal_distance_threshold: 10000.0
interceptor_terminal_tgo_threshold: 6.0

# 完整拦截弹双通道开关。
interceptor_enable_vertical_channel: true
interceptor_enable_lateral_channel: true

# 拦截弹错过判据。
use_range_rate_passed_termination: true
passed_distance_margin: 50.0
termination_x_margin: -50.0

# 端到端奖励参数。
reward_stage_action_weight: 0.03
reward_stage_target_weight: 0.002
reward_terminal_large_miss_slope: 0.02
reward_terminal_large_miss_bias: 50.6
reward_terminal_ideal_miss_slope: 1.0
reward_terminal_ideal_miss_bias: 20.0
reward_terminal_failure_penalty: 30.0
reward_ideal_miss_distance: 50.0
