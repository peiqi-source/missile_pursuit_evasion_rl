# lstm_sac.yaml
# 作用：
#   论文第 5 章 LSTM-SAC 智能体参数。

# sequence_length：状态序列长度。论文对比 n=1/3/5，其中 n=3 训练效率最好。
sequence_length: 3

# lstm_layer_sizes：Actor/Critic 的单向 LSTM 层宽，对齐论文表 5-1。
lstm_layer_sizes: [256, 256, 128]

# actor_fc_hidden_dim：Actor 中 LSTM 后的全连接层宽度。
actor_fc_hidden_dim: 128

# critic_hidden_dims：Critic 中 LSTM 后拼接动作的全连接层宽度。
critic_hidden_dims: [128, 128, 64]

# gamma：折扣因子，论文第 5 章使用 0.98。
gamma: 0.98

# tau：目标 Q 网络软更新系数。
tau: 0.005

# actor_lr：Actor 网络学习率，论文第 5 章为 3e-3。
actor_lr: 0.003

# critic_lr：Critic 网络学习率，论文第 5 章为 5e-3。
critic_lr: 0.005

# alpha_lr：熵系数学习率，论文第 5 章为 1e-3。
alpha_lr: 0.001

# batch_size：训练 batch 大小，论文第 5 章为 128。
batch_size: 128

# replay_buffer_size：LSTM-SAC 序列经验池容量，论文第 5 章为 30000。
replay_buffer_size: 30000

# automatic_entropy_tuning：是否自动调节熵系数。
automatic_entropy_tuning: true

# initial_alpha：固定 alpha 模式下使用的初始熵系数。
initial_alpha: 0.2
